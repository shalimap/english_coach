  flutter_offline: ^3.0.1
  flutter_spinkit: ^5.1.0
  flutter_staggered_grid_view: ^0.4.1
  flutter_svg: ^2.0.10+1
  fluttertoast: ^8.0.8
  google_fonts: ^6.2.1
